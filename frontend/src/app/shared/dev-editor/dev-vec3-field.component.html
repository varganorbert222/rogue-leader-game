<div class="field vec3-field">
  <span>{{ label }}</span>
  <div class="vec3-row">
    <label>
      <span class="axis">X</span>
      <input
        type="number"
        [min]="min ?? null"
        [step]="step"
        [ngModel]="vector.x"
        (ngModelChange)="onChange('x', $event)"
        (blur)="onBlur('x')"
      />
    </label>
    <label>
      <span class="axis">Y</span>
      <input
        type="number"
        [min]="min ?? null"
        [step]="step"
        [ngModel]="vector.y"
        (ngModelChange)="onChange('y', $event)"
        (blur)="onBlur('y')"
      />
    </label>
    <label>
      <span class="axis">Z</span>
      <input
        type="number"
        [min]="min ?? null"
        [step]="step"
        [ngModel]="vector.z"
        (ngModelChange)="onChange('z', $event)"
        (blur)="onBlur('z')"
      />
    </label>
  </div>
</div>
