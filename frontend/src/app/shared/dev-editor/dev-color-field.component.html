<div class="field color-field">
  <span>{{ label }}</span>
  <div class="color-field-row">
    <input
      type="color"
      [value]="hex"
      [attr.aria-label]="label"
      (input)="onHexChange($any($event.target).value)"
    />
    <label class="alpha-control">
      <span>A</span>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        [ngModel]="color.a"
        (ngModelChange)="onAlphaChange($event)"
        [attr.aria-label]="label + ' alpha'"
      />
      <span class="alpha-value">{{ color.a | number: '1.2-2' }}</span>
    </label>
  </div>
</div>
