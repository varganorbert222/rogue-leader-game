<div class="page">
  <h1>Settings</h1>

  <app-settings-panel
    [showControlsHint]="false"
    (audioChange)="onAudioChange($event)"
    (flightChange)="onFlightChange()"
  />

  <p class="nav-hint">
    <a routerLink="/controls" (click)="audio.playUiClick()" (mouseenter)="audio.playUiHover()">Irányítás / Controls →</a>
  </p>

  <a routerLink="/" (click)="audio.playUiBack()" (mouseenter)="audio.playUiHover()">Back</a>
</div>
