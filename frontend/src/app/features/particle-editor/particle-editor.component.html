<app-dev-editor-shell
  title="Particle System Editor"
  badge="dev"
  leftTitle="Effect"
  rightTitle="Particle System"
  (canvasReady)="onCanvasReady($event)"
>
  <div devEditorLeft>
    <section class="inspector-section">
      <label class="field">
        <span>Preset</span>
        <select
          [ngModel]="selectedPresetId"
          (ngModelChange)="onPresetChange($event)"
          [disabled]="loading"
        >
          @for (preset of presets; track preset.id) {
            <option [value]="preset.id">{{ preset.label }}</option>
          }
        </select>
      </label>

      <div class="panel-actions">
        <button type="button" class="secondary-btn" (click)="newPreset()">New</button>
        <button type="button" class="secondary-btn" (click)="duplicatePreset()">Duplicate</button>
      </div>

      @if (effect) {
        <label class="field">
          <span>Effect name</span>
          <input type="text" [(ngModel)]="effect.name" (ngModelChange)="onEffectNameChange()" />
        </label>
      }
    </section>

    <app-hierarchy-panel
      title="Modules"
      [resetKey]="hierarchyRevision"
      [nodes]="hierarchy"
      [selectedId]="selectedSystemId"
      [editable]="true"
      [flatReorderUnderRoot]="true"
      emptyMessage="Add a particle system module"
      (nodeSelect)="onHierarchySelect($event)"
      (nodeReorder)="onHierarchyReorder($event)"
    />

    <div class="panel-actions">
      <button type="button" class="secondary-btn" (click)="addSystem()">+ Module</button>
      <button
        type="button"
        class="secondary-btn"
        (click)="removeSelectedSystem()"
        [disabled]="!selectedSystem || (effect?.systems?.length ?? 0) <= 1"
      >
        Remove
      </button>
    </div>

    <p class="hint">
      Orbit: drag · Zoom: wheel · Bloom matches in-game render.json · Drag modules to reorder.
    </p>

    <app-dev-editor-status [loading]="loading" [errorMessage]="errorMessage" />
  </div>

  <div devEditorRight>
    @if (!selectedSystem) {
      <p class="hint">Select a module in the hierarchy.</p>
    } @else {
      <app-particle-system-inspector
        [system]="selectedSystem"
        [particleTextures]="particleTextures"
        [playing]="playing"
        (systemChange)="onSystemFieldChange()"
        (durationChange)="onDurationChange()"
        (loopingChange)="onLoopingChange()"
        (emissionModeChange)="onEmissionModeChange()"
        (albedoTextureChange)="onAlbedoTextureChange()"
        (atlasCellSelect)="onSystemFieldChange()"
        (setAtlasRangeEdge)="onSystemFieldChange()"
        (playAll)="playPreview()"
        (playModule)="playSelectedSystem()"
        (stop)="stopPreview()"
      />
    }

    <app-dev-json-copy title="Presets" [data]="savePayload" />
  </div>
</app-dev-editor-shell>
